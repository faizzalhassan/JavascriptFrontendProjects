<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Character Counter - Javascipt Mini Project</title>
</head>

<body>
    <main>
        <div class="container">
            <h2>Character Counter</h2>
            <textarea id="textField" cols="20" rows="7" placeholder="Enter Text to count characters"></textarea>
            <p class="outputBadge">Total Characters you have typed is <span class="showCount">-</span></p>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
